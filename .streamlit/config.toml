[theme]
base = "dark"
primaryColor = "#C9A25D"
backgroundColor = "#09090B"
secondaryBackgroundColor = "#121214"
textColor = "#ECE7DF"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 1024
maxMessageSize = 1024

[browser]
gatherUsageStats = false
